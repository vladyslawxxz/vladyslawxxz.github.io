<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>scripts</title>
<base target="_blank">
</head>
<body>
<pre id="list"></pre>
<script>
fetch('scripts.json')
  .then(r => r.json())
  .then(data => {
    let out = '';
    for (const file of data.scripts) {
      out += file.replace('.lua','') + ': ./scripts/' + file + '\n';
    }
    document.getElementById('list').textContent = out;
  });
</script>
</body>
</html>
